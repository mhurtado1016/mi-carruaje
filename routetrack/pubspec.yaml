name: routetrack
description: App de tracking GPS para conductores logísticos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # GPS
  geolocator: ^12.0.0
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1

  # Mapas (sin API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Red
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Storage local
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.1
  share_plus: ^9.0.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
